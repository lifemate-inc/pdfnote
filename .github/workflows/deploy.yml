name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  # 手動実行も可能
  workflow_dispatch:

# 2026/6/2 以降の Node.js 20 deprecation 対応: JavaScript Actions を Node.js 24 ランタイムで実行
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

# GitHub Pages へのデプロイ権限を付与
permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つだけ許可（進行中のデプロイをキャンセルしない）
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
